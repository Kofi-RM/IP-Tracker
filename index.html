<!DOCTYPE html>
 <html lang="en"> 
  <head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
     <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png"> 
     <link rel="stylesheet" href="styles.css"> 
     <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
     <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script src="./script.js" defer></script>
      <title>IP Address Tracker

      </title>
     </head> 
     <body> 
      <header id="hero-section"> 
        <img id="banner" src="./images/pattern-bg-desktop.png" alt="Blue background with street lines in a lighter blue" aria-hidden="true">
         <div id="hero"> 
          <h1>IP Address Tracker</h1> 
          <form id="input" role="search" aria-label="Search IP address or domain"> 
          <label for="ip-bar" class="sr-only"> Search for IP address or domain </label> 
          <input id="ip-bar" type="text" placeholder="Search for any IP address or domain"aria-describedby="search-help"> 
          <button id="submit-btn" type="submit" aria-label="Search IP address"> 
            <img id="arrow" src="./images/icon-arrow.svg" alt="" aria-hidden="true">
           </button> 
          </form> 
          <span id="search-help" class="sr-only"> Enter an IP address or domain name and press search </span> 
        </div> 

        <div id="error-popup" role="alert"> </div> 

         <section id="info"  aria-label="IP Address Information">
           <div class="card">
             <h2>IP Address</h2> 
             <p id="ip" aria-live="polite"></p> 
            </div> <div class="card"> 
              <h2>Location</h2> 
              <p id="location" aria-live="polite"></p> 
            </div> <div class="card"> 
              <h2>Timezone</h2>
               <p id="timezone" aria-live="polite"></p> 
              </div> 
              <div class="card"> 
                <h2>ISP</h2>
                 <p id="isp" aria-live="polite">

                 </p> 
                </div> 
              </section> 
            </header> 
            <main> 
              <section id="map" aria-label="Map showing IP address location"> 

     </section> 
    </main> 
  </body> 
  </html>
